#命令前缀
Prefix: '&bLite&3SignIn &f&l>>> '

#PlaceholderAPI设置
PlaceholderAPI:
    #是否使用
    Enabled: true
    #占位符缓存更新的延迟（秒）
    #由于部分占位符需要不断地读取数据库的数据，
    #此选项用于防止频繁调用PAPI占位符对数据库IO造成的巨大负担
    Cache-Update-Delay: 10
    #例外的占位符（不进行缓存的）
    Exceptions: [] 

#今日在线时长条件（在线达到一定时间后才可签到）
#注意：今日在线时长统计会因服务器重启或插件卸载而重置
Online-Duration-Condition:
    #是否启用
    Enabled: false
    #需要的时间
    #格式： 时:分:秒， 从左往右
    #最小值: 00:00:00 ,最大值: 23:59:59
    Time: 00:03:00
    #今日在线时长累计（启用后，即便玩家中途掉线，今日在线时长也会保留）
    Statistics: true
    
#禁止签到的世界
#当玩家处于列表中的世界时无法进行签到
Disabled-Worlds: []

#是否启用多组奖励模式
#当玩家同时拥有多个奖励组的权限时，将在签到时同时获得它们的奖励
#例如玩家同时拥有Group1和Group2的组权限，签到后将同时获得这两个组的奖励
Enable-Multi-Group-Reward: false

#是否在玩家进入服务器的时候提醒玩家签到
Join-Event:
    Enabled: true
    #是否启用进服时自动签到（需要拥有权限）
    Auto-SignIn: false
    #延迟（单位：秒）
    Delay: 0

#是否启用箱子GUI作为签到菜单
#启用后可使用/signin gui打开菜单
GUI-Settings: true

#异步 IO 执行器设置
#Task-Thread-Delay 与 Async-Task-Settings 为旧版本兼容键。
#当前版本始终使用单线程 ScheduledExecutorService 执行数据库/网络 IO，
#并确保所有 Bukkit API、权限、消息和事件回到服务器主线程。
Async-Thread-Settings:
    Task-Thread-Delay: 0.1
    Async-Task-Settings:
        Load-Data: true
        Open-GUI: false
    
#补签卡
Retroactive-Card:
    #如果为false， 则不启用补签功能
    Enabled: true
    #补签的间隔， 单位秒
    Intervals: 5
    #每一次补签所需的补签卡数量
    Quantity-Required: 1
    #下限日期，玩家无法对这之前的日期进行补签
    #PS: 2019年11月15日是本插件初代版本完工之日
    Minimum-Date: '2019-11-15'
    #所需物品
    Required-Item:
        #如果为false， 则补签卡将不是一个可以被放置于物品栏中的物品，而会是虚拟道具
        #你可以使用/signin info [玩家] 查看一名玩家拥有的补签卡数量
        Enabled: false
        #补签卡物品的显示名（支持颜色码，例如 '&e&l补签卡'）
        #物理卡模式下（Enabled: true），补签时会遍历玩家背包，
        #查找 displayName 等于此值的物品，扣除 Quantity-Required 个后补签成功，
        #否则补签失败。补签卡的发放/管理请使用服务器的统一物品管理器。
        Name: '&e&l补签卡'

#SQLite 数据库设置
SQLite-Storage:
    #数据库文件名
    Database-File: 'Database.db'
    #数据库文件夹路径
    Database-Path: 'plugins/LiteSignIn/'
    #每名玩家独立的数据刷新间隔（秒）。小于等于0时禁用定时刷新，
    #数据仅在首次加载、重载或重新进入服务器时刷新。
    Refresh-Interval: 5
    #数据表名称
    Table-Name: playerdata

#签到奖励任务顺序
#默认顺序依次是 命令执行 -> 信息发送 -> 广播信息-> 播放声音
#（物品奖励已移除，请使用服务器统一物品管理器发放奖励物品）
Reward-Task-Sequence:
- COMMANDS_EXECUTION
- MESSAGES_SENDING
- BROADCAST_MESSAGES_SENDING
- PLAYSOUNDS

#权限设置
#当Default为true时，将默认所有人都有权限。
Permissions:
    #补签卡相关权限
    Retroactive-Card:
        #使用补签卡
        Use:
            Permission: signin.retroactive-card.use
            Default: true
        #持有补签卡，若无权限则会自动被系统没收
        Hold:
            Permission: signin.retroactive-card.hold
            Default: true
    #登入服务器时自动签到的权限
    Join-Auto-SignIn:
        Default: false
        Permission: signin.joinevent.autosignin
    Disabled-Worlds-Bypass:
        Default: false
        Permission: signin.bypass
    #命令相关权限
    Commands:
        Help: 
            Permission: signin.command.help
            Default: true
        Reload: 
            Permission: signin.command.reload
            Default: false
        GUI: 
            Permission: signin.command.gui
            Default: true
        Designated-GUI: 
            Permission: signin.command.designatedgui
            Default: false
        Click: 
            Permission: signin.command.click
            Default: true
        Click-Others: 
            Permission: signin.command.clickothers
            Default: false
        Info: 
            Permission: signin.command.info
            Default: false
        RetroactiveCard:
            Permission: signin.command.retroactivecard
            Default: false
        Save:
            Permission: signin.command.save
            Default: false
        Database:
            Permission: signin.command.database
            Default: false
        Reward:
            Permission: signin.command.reward
            Default: false
